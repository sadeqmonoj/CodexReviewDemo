name: Build and Test ASP.NET Core Application

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore src/CodexReviewDemo.slnx

      - name: Build
        run: dotnet build src/CodexReviewDemo.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test src/CodexReviewDemo.slnx --no-build --configuration Release